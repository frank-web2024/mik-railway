<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>轨道交通地图</title>
<style>
  :root {
    --bg: #1a1d23;
    --panel-bg: rgba(26, 29, 35, 0.92);
    --text: #e0e0e0;
    --text-dim: #999;
    --accent: #4fc3f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: "PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif; }
  #canvas-container { position: fixed; inset: 0; }
  canvas { display: block; }

  /* 顶部信息栏 */
  #top-bar {
    position: fixed; top: 16px; left: 16px; right: 16px; z-index: 10;
    display: flex; gap: 12px; align-items: center; pointer-events: none;
  }
  #top-bar > * { pointer-events: auto; }
  #title-card {
    background: var(--panel-bg); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 12px 20px; color: var(--text);
  }
  #title-card h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
  #title-card span { font-size: 12px; color: var(--text-dim); }

  /* 图例 */
  #legend {
    position: fixed; bottom: 24px; left: 16px; z-index: 10;
    background: var(--panel-bg); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 14px 18px; color: var(--text); min-width: 180px;
  }
  #legend h3 { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; font-size: 13px; }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend-line { width: 20px; height: 3px; border-radius: 2px; flex-shrink: 0; }
  .legend-badge {
    font-size: 10px; padding: 1px 6px; border-radius: 4px;
    background: rgba(255,255,255,0.1); color: var(--text-dim); margin-left: auto;
  }

  /* 操作提示 */
  /* 俯视按钮 */
  #topview-btn {
    position: fixed; bottom: 24px; right: 24px; z-index: 10;
    width: 44px; height: 44px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 10px;
    background: var(--panel-bg); backdrop-filter: blur(12px);
    color: var(--text); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }
  #topview-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.35); }
  #topview-btn.active { background: var(--accent); color: #1a1d23; border-color: var(--accent); }

  #hint {
    position: fixed; bottom: 80px; right: 24px; z-index: 10;
    background: var(--panel-bg); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 10px 16px; color: var(--text-dim); font-size: 12px;
    pointer-events: none; user-select: none;
  }
  #hint span { color: var(--accent); }

  /* Tooltip */
  #tooltip {
    position: fixed; z-index: 20; pointer-events: none; opacity: 0;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
    padding: 12px 16px; color: #fff; font-size: 13px; line-height: 1.6;
    transform: translate(-50%, -120%); transition: opacity 0.15s;
    white-space: nowrap; max-width: 280px;
  }
  #tooltip.visible { opacity: 1; }
  #tooltip .tt-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  #tooltip .tt-line { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 4px; color: #fff; }
  #tooltip .tt-row { color: #bbb; font-size: 12px; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="top-bar">
  <div id="title-card">
    <h1 id="network-name">轨道交通</h1>
    <span id="update-info"></span>
  </div>
  <a href="map2d.html" style="
    background:var(--panel-bg); backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.12); border-radius:10px;
    padding:10px 16px; color:var(--text); font-size:13px;
    text-decoration:none; transition:border-color 0.2s;
  ">📐 2D 地图</a>
</div>

<button id="topview-btn" title="切换俯视图">⬇</button>

<div id="legend"><h3>线路图例</h3><div id="legend-list"></div></div>
<div id="hint"><span>🖱 左键旋转</span> &nbsp;|&nbsp; <span>🖱 中键平移</span> &nbsp;|&nbsp; <span>🖱 右键缩放</span></div>
<div id="tooltip"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ── 数据加载 ──────────────────────────────────
const res = await fetch('railway_data.json');
const data = await res.json();

// 地面高度：取所有站点最低 y 坐标再往下偏移
const allY = data.stations.flatMap(s => s.levels.map(l => l.coordinate.y));
const GROUND_Y = Math.min(...allY) - 15;

// ── 常量 ──────────────────────────────────────
const STATION_RADIUS = 6;
const STATION_SEGMENTS = 32;

// ── 场景初始化 ────────────────────────────────
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1d23');
scene.fog = new THREE.Fog('#1a1d23', 2000, 8000);

const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 5, 8000);
camera.position.set(350, 300, 800);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// CSS2D 渲染器（标签）
const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(container.clientWidth, container.clientHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(labelRenderer.domElement);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(-50, 60, 540);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 10;
controls.maxDistance = 4000;
controls.maxPolarAngle = Math.PI * 0.75;
// 鼠标映射：左键旋转、中键平移、右键缩放
controls.mouseButtons.LEFT = THREE.MOUSE.ROTATE;
controls.mouseButtons.MIDDLE = THREE.MOUSE.PAN;
controls.mouseButtons.RIGHT = THREE.MOUSE.DOLLY;
controls.update();

// ── 光照 ──────────────────────────────────────
const ambient = new THREE.AmbientLight('#8899bb', 1.4);
scene.add(ambient);

const sun = new THREE.DirectionalLight('#ffffff', 2.5);
sun.position.set(300, 400, 200);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 1;
sun.shadow.camera.left = -2000;
sun.shadow.camera.right = 2000;
sun.shadow.camera.top = 2000;
sun.shadow.camera.bottom = -2000;
sun.shadow.camera.far = 6000;
scene.add(sun);

const hemi = new THREE.HemisphereLight('#8899cc', '#334455', 0.6);
scene.add(hemi);

// ── 辅助元素 ──────────────────────────────────
// 地面网格（方形，匹配 Minecraft 坐标风格）
const gridSize = 3000;
const gridDiv = 80;
const grid = new THREE.GridHelper(gridSize, gridDiv, '#333840', '#2a2d35');
grid.position.y = GROUND_Y;
scene.add(grid);

// 大地板半透明平面
const groundGeo = new THREE.PlaneGeometry(gridSize, gridSize);
const groundMat = new THREE.MeshStandardMaterial({ color: '#1d2027', roughness: 1, metalness: 0, transparent: true, opacity: 0.55 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = GROUND_Y - 0.5;
ground.receiveShadow = true;
scene.add(ground);


// ── 构建线路索引 ──────────────────────────────
const lineMap = {};
for (const l of data.lines) lineMap[l.lineId] = l;

// 收集每个线路的所有层级（用于连线）
const lineLevels = {}; // lineId → [{station, levelObj}]
for (const st of data.stations) {
  for (const lv of st.levels) {
    if (!lineLevels[lv.lineId]) lineLevels[lv.lineId] = [];
    lineLevels[lv.lineId].push({ station: st, level: lv });
  }
}

// ── 工具函数 ──────────────────────────────────
function toVec3(coord) {
  return new THREE.Vector3(coord.x, coord.y, coord.z);
}

// ── 绘制线路连线 (TubeGeometry 单管道) ──────
const lineGroup = new THREE.Group();
scene.add(lineGroup);

const TUBE_RADIUS = 2.5;
const TUBE_SEGMENTS = 80;
const TUBE_RADIAL = 8;

for (const [lineId, items] of Object.entries(lineLevels)) {
  const line = lineMap[lineId];
  if (!line) continue;
  const color = new THREE.Color(line.color || '#888');
  const isPlanned = line.type === 'Planned';

  if (items.length < 2) continue;

  const sorted = [...items].sort((a, b) => a.level.coordinate.x - b.level.coordinate.x);
  const points = sorted.map(it => toVec3(it.level.coordinate));
  const curve = new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.5);

  if (isPlanned) {
    const tubeGeo = new THREE.TubeGeometry(curve, TUBE_SEGMENTS, TUBE_RADIUS * 0.5, TUBE_RADIAL, false);
    const tubeMat = new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.2, transparent: true, opacity: 0.4 });
    const tube = new THREE.Mesh(tubeGeo, tubeMat);
    tube.castShadow = true; tube.receiveShadow = true;
    lineGroup.add(tube);
    // 虚线叠加
    const dashPts = curve.getPoints(points.length * 20);
    const dashGeo = new THREE.BufferGeometry().setFromPoints(dashPts);
    const dashLine = new THREE.Line(dashGeo, new THREE.LineDashedMaterial({ color, linewidth: 2, dashSize: 10, gapSize: 6 }));
    dashLine.computeLineDistances();
    lineGroup.add(dashLine);
  } else {
    const tubeGeo = new THREE.TubeGeometry(curve, TUBE_SEGMENTS, TUBE_RADIUS, TUBE_RADIAL, false);
    const tubeMat = new THREE.MeshStandardMaterial({ color, roughness: 0.3, metalness: 0.5 });
    const tube = new THREE.Mesh(tubeGeo, tubeMat);
    tube.castShadow = true; tube.receiveShadow = true;
    lineGroup.add(tube);
    // 发光外层
    const glowGeo = new THREE.TubeGeometry(curve, TUBE_SEGMENTS, TUBE_RADIUS * 1.6, TUBE_RADIAL, false);
    const glowTube = new THREE.Mesh(glowGeo, new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.12, depthWrite: false }));
    lineGroup.add(glowTube);
  }
}

// ── 绘制同站不同层级的垂直连线（突出同站多层） ──
const stationLevelGroups = {};
for (const st of data.stations) stationLevelGroups[st.stationId] = st.levels;

const vDashGroup = new THREE.Group();
scene.add(vDashGroup);

for (const [, levels] of Object.entries(stationLevelGroups)) {
  if (levels.length < 2) continue;
  const sorted = [...levels].sort((a, b) => a.level - b.level);
  for (let i = 0; i < sorted.length - 1; i++) {
    const a = toVec3(sorted[i].coordinate);
    const b = toVec3(sorted[i + 1].coordinate);
    // 明显虚线：同站多层连接
    const geo = new THREE.BufferGeometry().setFromPoints([a, b]);
    const mat = new THREE.LineDashedMaterial({ color: '#ffaa00', linewidth: 2, dashSize: 5, gapSize: 4, transparent: true, opacity: 0.7 });
    const dash = new THREE.Line(geo, mat);
    dash.computeLineDistances();
    vDashGroup.add(dash);
  }
}

// ── 绘制站点 ──────────────────────────────────
const stationGroup = new THREE.Group();
scene.add(stationGroup);
const stationMeshes = [];
const sphereGeo = new THREE.SphereGeometry(STATION_RADIUS, STATION_SEGMENTS, STATION_SEGMENTS);

for (const st of data.stations) {
  // 先收集站点所有层级的 x/z 范围
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  for (const lv of st.levels) {
    minX = Math.min(minX, lv.coordinate.x); maxX = Math.max(maxX, lv.coordinate.x);
    minZ = Math.min(minZ, lv.coordinate.z); maxZ = Math.max(maxZ, lv.coordinate.z);
  }
  const cx = (minX + maxX) / 2, cz = (minZ + maxZ) / 2;
  const bw = Math.max(maxX - minX + 20, 28), bh = Math.max(maxZ - minZ + 20, 28);
  const maxY = Math.max(...st.levels.map(l => l.coordinate.y));
  const minY = Math.min(...st.levels.map(l => l.coordinate.y));
  const padY = STATION_RADIUS * 2;
  const boxH = maxY - minY + padY * 2;
  const boxCY = (minY + maxY) / 2;

  // —— 站点3D长方体线框（包裹该站点所有层级） ——
  const boxGeo = new THREE.BoxGeometry(bw, boxH, bh);
  const edgeGeo = new THREE.EdgesGeometry(boxGeo);
  const edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.55 });
  const wireBox = new THREE.LineSegments(edgeGeo, edgeMat);
  wireBox.position.set(cx, boxCY, cz);
  stationGroup.add(wireBox);

  const fillMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.06, side: THREE.DoubleSide, depthWrite: false });
  const fillBox = new THREE.Mesh(boxGeo, fillMat);
  fillBox.position.copy(wireBox.position);
  stationGroup.add(fillBox);

  // 各层级球体
  for (const lv of st.levels) {
    const line = lineMap[lv.lineId];
    const color = new THREE.Color(line?.color || '#888');
    const pos = toVec3(lv.coordinate);

    const sphereMat = new THREE.MeshStandardMaterial({ color, roughness: 0.3, metalness: 0.4 });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    sphere.position.copy(pos);
    sphere.castShadow = true;
    sphere.receiveShadow = true;
    sphere.userData = { station: st, levelObj: lv, line, isStation: true };
    stationGroup.add(sphere);
    stationMeshes.push({ mesh: sphere, station: st, levelObj: lv, line });
  }
}

// ── CSS 标签 ──────────────────────────────────
const labelGroup = new THREE.Group();
scene.add(labelGroup);

// ── 站点标签（含层级数和坐标）
for (const st of data.stations) {
  const avgX = st.levels.reduce((s, l) => s + l.coordinate.x, 0) / st.levels.length;
  const avgY = st.levels.reduce((s, l) => s + l.coordinate.y, 0) / st.levels.length;
  const avgZ = st.levels.reduce((s, l) => s + l.coordinate.z, 0) / st.levels.length;
  const pos = new THREE.Vector3(avgX, avgY + STATION_RADIUS + 5, avgZ);
  const hasMulti = st.levels.length > 1;

  const div = document.createElement('div');
  const c0 = st.levels[0].coordinate;
  div.innerHTML = `<span style="font-weight:600;">${st.name}</span>${hasMulti ? ' <span style="color:#ffaa00;font-size:10px;">'+st.levels.length+'层</span>' : ''}<br><span style="font-size:10px;color:#999;">x${c0.x} y${c0.y} z${c0.z}</span>`;
  div.style.cssText = `
    color: #ffffff; font-size: 12px;
    text-shadow: 0 0 8px rgba(0,0,0,0.8), 0 0 3px rgba(0,0,0,0.9);
    white-space: nowrap; pointer-events: none;
    letter-spacing: 0.5px; text-align: center; line-height: 1.4;
  `;
  const label = new CSS2DObject(div);
  label.position.copy(pos);
  label.userData = { isLabel: true };
  labelGroup.add(label);
}

// ── Raycaster hover 交互 ──────────────────────
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 10;
raycaster.params.Line.threshold = 5;
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

let hoveredMesh = null;

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(stationMeshes.map(s => s.mesh), false);

  if (hits.length > 0) {
    const obj = hits[0].object;
    if (obj.userData.isStation && obj !== hoveredMesh) {
      // 还原上一个 hover
      if (hoveredMesh) {
        hoveredMesh.material.emissive.setHex(hoveredMesh.userData.origEmissive);
        hoveredMesh.material.emissiveIntensity = hoveredMesh.userData.origEmissiveIntensity;
        hoveredMesh.scale.set(1, 1, 1);
      }
      hoveredMesh = obj;
      // 保存原始值
      obj.userData.origEmissive = obj.material.emissive.getHex();
      obj.userData.origEmissiveIntensity = obj.material.emissiveIntensity;
      // 高亮
      obj.material.emissive.set('#ffffff');
      obj.material.emissiveIntensity = 0.6;
      obj.scale.set(1.35, 1.35, 1.35);

      const { station, levelObj, line } = obj.userData;
      const date = station.openingDate ? `${station.openingDate.y}-${String(station.openingDate.m).padStart(2,'0')}-${String(station.openingDate.d).padStart(2,'0')}` : '未知';
      const levelLabel = levelObj.level >= 0 ? `地上 ${levelObj.level} 层` : `地下 ${Math.abs(levelObj.level)} 层`;
      const dirLabel = levelObj.direction === 'e,w' ? '东西向' : levelObj.direction === 's,n' ? '南北向' : levelObj.direction;
      const c = levelObj.coordinate;
      const sameStationCount = station.levels.length;

      tooltip.innerHTML = `
        <div class="tt-name">${station.name} ${sameStationCount > 1 ? '<span style="color:#ffaa00;font-size:11px;">('+sameStationCount+'层)</span>' : ''}</div>
        <div class="tt-row">📍 ${station.district} &nbsp;|&nbsp; 🚉 ${station.platformCount} 站台</div>
        <div class="tt-row">🏗 ${levelLabel} &nbsp;|&nbsp; 🛤 ${dirLabel} &nbsp;|&nbsp; ${levelObj.tracks} 轨</div>
        <div class="tt-row">📅 开通: ${date}</div>
        <div class="tt-row" style="color:#ffcc80;">📐 坐标: x=${c.x} y=${c.y} z=${c.z}</div>
        <div style="margin-top:6px;"><span class="tt-line" style="background:${line?.color||'#888'}">${line?.lineName||levelObj.lineId}</span> <span style="font-size:10px;color:#999">${line?.type||''}</span></div>
      `;
      tooltip.classList.add('visible');
      tooltip.style.left = e.clientX + 'px';
      tooltip.style.top = e.clientY + 'px';
    }
  } else {
    if (hoveredMesh) {
      hoveredMesh.material.emissive.setHex(hoveredMesh.userData.origEmissive);
      hoveredMesh.material.emissiveIntensity = hoveredMesh.userData.origEmissiveIntensity;
      hoveredMesh.scale.set(1, 1, 1);
      hoveredMesh = null;
    }
    tooltip.classList.remove('visible');
  }
}

window.addEventListener('mousemove', onMouseMove, { passive: true });

// ── 俯视图切换按钮 ────────────────────────────
const topviewBtn = document.getElementById('topview-btn');
let isTopView = false;
const savedTarget = new THREE.Vector3();
const savedCamPos = new THREE.Vector3();
const targetPos = new THREE.Vector3();
const targetLook = new THREE.Vector3();
let animating = false;

// 预计算场景中心（供俯视使用）
const allX = data.stations.flatMap(s => s.levels.map(l => l.coordinate.x));
const allZ = data.stations.flatMap(s => s.levels.map(l => l.coordinate.z));
const centerX = (Math.min(...allX) + Math.max(...allX)) / 2;
const centerZ = (Math.min(...allZ) + Math.max(...allZ)) / 2;

topviewBtn.addEventListener('click', () => {
  isTopView = !isTopView;
  if (isTopView) {
    savedCamPos.copy(camera.position);
    savedTarget.copy(controls.target);
    // 俯视：飞到场景正上方，解除角度限制允许自由缩放旋转
    targetPos.set(centerX, 350, centerZ);
    targetLook.set(centerX, GROUND_Y, centerZ);
    controls.maxPolarAngle = Math.PI;
    topviewBtn.textContent = '↺';
    topviewBtn.classList.add('active');
  } else {
    targetPos.copy(savedCamPos);
    targetLook.copy(savedTarget);
    controls.maxPolarAngle = Math.PI * 0.75;
    topviewBtn.textContent = '⬇';
    topviewBtn.classList.remove('active');
  }
  animating = true;
});

// ── 响应式 ────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
  labelRenderer.setSize(container.clientWidth, container.clientHeight);
});

// ── 渲染循环 ──────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // 标签面向相机
  for (const child of labelGroup.children) {
    child.lookAt(camera.position);
  }

  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();

// ── 填充分页信息 ──────────────────────────────
const sysInfo = data.systemInfo || {};
document.getElementById('network-name').textContent = sysInfo.network || '轨道交通';
const lu = data.lastUpdated;
const luStr = lu ? `${lu.y}-${String(lu.m).padStart(2,'0')}-${String(lu.d).padStart(2,'0')}` : '';
document.getElementById('update-info').textContent = luStr ? `数据更新: ${luStr}` : '';

// ── 填充图例 ──────────────────────────────────
const legendList = document.getElementById('legend-list');
for (const line of data.lines) {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `
    <span class="legend-dot" style="background:${line.color};box-shadow:0 0 6px ${line.color}"></span>
    <span>${line.lineName}</span>
    <span class="legend-badge">${line.type||''}</span>
  `;
  legendList.appendChild(item);
}

console.log(`✅ 轨道交通地图已就绪 — ${data.stations.length} 个站点, ${data.lines.length} 条线路`);
</script>
